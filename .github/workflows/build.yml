name: Build

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Swing GUI テスト (AssertJ-Swing) は DISPLAY が必要なため仮想ディスプレイでラップする。
      # DISPLAY 未設定でも該当テストは Assume で skip されるが、CI では実行できるようにする。
      - name: Build, test and checkstyle
        run: xvfb-run -a ./gradlew --no-daemon check jar
