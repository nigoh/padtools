plugins {
    id 'java'
    id 'checkstyle'
}

group = 'com.padtools'
version = '1.5'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
    maven { url = uri('https://oss.sonatype.org/service/local/repositories/releases/content/') }
}

dependencies {
    implementation 'org.apache.xmlgraphics:batik-svggen:1.17'
    implementation 'org.apache.xmlgraphics:batik-dom:1.17'
    implementation 'com.rover12421.opensource:JFontChooser:1.0.5-3'
    testImplementation 'junit:junit:4.13.2'
}

def defaultEncoding = 'UTF-8'
tasks.withType(JavaCompile).configureEach {
    options.encoding = defaultEncoding
}

test {
    useJUnit()
    testLogging {
        events 'passed', 'skipped', 'failed'
        showStandardStreams = false
    }
}

jar {
    archiveFileName = 'PadTools.jar'
    manifest {
        attributes 'Main-Class': 'padtools.Main'
        attributes 'Class-Path': configurations.runtimeClasspath.collect { 'libs/' + it.name }.join(' ')
    }
}

checkstyle {
    toolVersion = '10.21.1'
    configFile = file("${projectDir}/config/checkstyle/checkstyle.xml")
    ignoreFailures = false
    maxWarnings = 0
}

tasks.named('checkstyleMain') { source = 'src/main/java' }
tasks.named('checkstyleTest') { source = 'src/test/java' }

tasks.register('makeZip', Zip) {
    dependsOn 'jar'
    outputs.upToDateWhen { false }

    from 'bundle'
    from 'build/libs/PadTools.jar'

    into('libs') {
        from configurations.runtimeClasspath
    }
}
