# Help content (HTML)
help.spd.content=<html><body style="font-family:sans-serif;font-size:12px;">\
<h2>SPD Syntax Reference</h2>\
<h3>Basic</h3>\
<ul>\
<li>Each line = one box (process node)</li>\
<li>Indent with <b>Tab</b> to create child blocks</li>\
<li><code>#</code> at start of line = comment (ignored)</li>\
<li><code>@</code> at end of line = continues to next line</li>\
</ul>\
<h3>Commands</h3>\
<table border="1" cellpadding="4" cellspacing="0">\
<tr><th>Command</th><th>Description</th><th>Example</th></tr>\
<tr><td><code>:if condition</code></td><td>If branch (true path indented below)</td><td><code>:if x &gt; 0</code></td></tr>\
<tr><td><code>:else</code></td><td>Else branch (follows :if at same indent)</td><td><code>:else</code></td></tr>\
<tr><td><code>:while condition</code></td><td>Pre-condition loop</td><td><code>:while i &lt; 10</code></td></tr>\
<tr><td><code>:dowhile condition</code></td><td>Post-condition loop</td><td><code>:dowhile count &gt; 0</code></td></tr>\
<tr><td><code>:switch expression</code></td><td>Multi-way branch</td><td><code>:switch status</code></td></tr>\
<tr><td><code>:case label</code></td><td>Case label (follows :switch)</td><td><code>:case "OK"</code></td></tr>\
<tr><td><code>:call name</code></td><td>Subroutine call</td><td><code>:call initialize()</code></td></tr>\
<tr><td><code>:terminal label</code></td><td>Start/End terminal</td><td><code>:terminal START</code></td></tr>\
<tr><td><code>:comment text</code></td><td>Annotation box</td><td><code>:comment Note</code></td></tr>\
</table>\
<h3>Example</h3>\
<pre>\
:terminal START\n\
:if x &gt; 0\n\
\tProcess A\n\
:else\n\
\tProcess B\n\
:while i &lt; 10\n\
\ti = i + 1\n\
:terminal END\
</pre>\
</body></html>

