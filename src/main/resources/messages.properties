# Template names
template.basic.name=Basic
template.ifelse.name=If/Else
template.loop.name=Loop
template.switch.name=Switch

# Template content
template.basic=:terminal START\n:if condition\n\tProcess A\n:else\n\tProcess B\n:while i < 10\n\ti = i + 1\n:call subroutine()\n:terminal END
template.ifelse=:terminal START\n:if x > 0\n\tPositive\n:else\n\t:if x == 0\n\t\tZero\n\t:else\n\t\tNegative\n:terminal END
template.loop=:terminal START\n:while condition\n\tLoop body (pre-condition)\n:dowhile condition\n\tLoop body (post-condition)\n:terminal END
template.switch=:terminal START\n:switch value\n:case A\n\tProcess A\n:case B\n\tProcess B\n:case C\n\tProcess C\n:terminal END

