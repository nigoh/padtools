template.loop=:terminal \u958B\u59CB\n:while \u6761\u4EF6\n\t\u30EB\u30FC\u30D7\u672C\u4F53\uFF08\u524D\u5224\u5B9A\uFF09\n:dowhile \u6761\u4EF6\n\t\u30EB\u30FC\u30D7\u672C\u4F53\uFF08\u5F8C\u5224\u5B9A\uFF09\n:terminal \u7D42\u4E86
template.switch=:terminal \u958B\u59CB\n:switch \u5024\n:case A\n\t\u51E6\u7406A\n:case B\n\t\u51E6\u7406B\n:case C\n\t\u51E6\u7406C\n:terminal \u7D42\u4E86

