# \u30D8\u30EB\u30D7\u5185\u5BB9 (HTML)
help.spd.content=<html><body style="font-family:sans-serif;font-size:12px;">\
<h2>SPD\u69CB\u6587\u30EA\u30D5\u30A1\u30EC\u30F3\u30B9</h2>\
<h3>\u57FA\u672C</h3>\
<ul>\
<li>1\u884C = 1\u3064\u306E\u30DC\u30C3\u30AF\u30B9\uFF08\u51E6\u7406\u30CE\u30FC\u30C9\uFF09</li>\
<li><b>Tab</b>\u3067\u30A4\u30F3\u30C7\u30F3\u30C8\u3057\u3066\u5B50\u30D6\u30ED\u30C3\u30AF\u3092\u4F5C\u6210</li>\
<li>\u884C\u982D\u306E<code>#</code> = \u30B3\u30E1\u30F3\u30C8\uFF08\u7121\u8996\uFF09</li>\
<li>\u884C\u672B\u306E<code>@</code> = \u6B21\u306E\u884C\u306B\u7D9A\u304F</li>\
</ul>\
<h3>\u30B3\u30DE\u30F3\u30C9</h3>\
<table border="1" cellpadding="4" cellspacing="0">\
<tr><th>\u30B3\u30DE\u30F3\u30C9</th><th>\u8AAC\u660E</th><th>\u4F8B</th></tr>\
<tr><td><code>:if \u6761\u4EF6</code></td><td>\u6761\u4EF6\u5206\u5C90\uFF08\u771F\u306E\u5834\u5408\u306F\u4E0B\u306B\u30A4\u30F3\u30C7\u30F3\u30C8\uFF09</td><td><code>:if x &gt; 0</code></td></tr>\
<tr><td><code>:else</code></td><td>\u5076\u306E\u5206\u5C90\uFF08:if\u3068\u540C\u3058\u30A4\u30F3\u30C7\u30F3\u30C8\uFF09</td><td><code>:else</code></td></tr>\
<tr><td><code>:while \u6761\u4EF6</code></td><td>\u524D\u5224\u5B9A\u30EB\u30FC\u30D7</td><td><code>:while i &lt; 10</code></td></tr>\
<tr><td><code>:dowhile \u6761\u4EF6</code></td><td>\u5F8C\u5224\u5B9A\u30EB\u30FC\u30D7</td><td><code>:dowhile count &gt; 0</code></td></tr>\
<tr><td><code>:switch \u5F0F</code></td><td>\u591A\u5206\u5C90</td><td><code>:switch status</code></td></tr>\
<tr><td><code>:case \u30E9\u30D9\u30EB</code></td><td>\u30B1\u30FC\u30B9\uFF08:switch\u306E\u5F8C\uFF09</td><td><code>:case "OK"</code></td></tr>\
<tr><td><code>:call \u540D\u524D</code></td><td>\u30B5\u30D6\u30EB\u30FC\u30C1\u30F3\u547C\u3073\u51FA\u3057</td><td><code>:call initialize()</code></td></tr>\
<tr><td><code>:terminal \u30E9\u30D9\u30EB</code></td><td>\u958B\u59CB/\u7D42\u4E86\u7AEF\u5B50</td><td><code>:terminal START</code></td></tr>\
<tr><td><code>:comment \u30C6\u30AD\u30B9\u30C8</code></td><td>\u6CE8\u91C8\u30DC\u30C3\u30AF\u30B9</td><td><code>:comment \u6CE8\u610F</code></td></tr>\
</table>\
<h3>\u4F8B</h3>\
<pre>\
:terminal START\n\
:if x &gt; 0\n\
\tProcess A\n\
:else\n\
\tProcess B\n\
:while i &lt; 10\n\
\ti = i + 1\n\
:terminal END\
</pre>\
</body></html>

